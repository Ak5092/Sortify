<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sortify">
<meta name="theme-color" content="#0d0d0d">
<title>Sortify</title>
<script>
(function(){
  try {
    var c=document.createElement('canvas'); c.width=c.height=512;
    var x=c.getContext('2d');

    // Clip to rounded rect
    x.beginPath();
    x.moveTo(96,0); x.arcTo(512,0,512,512,96); x.arcTo(512,512,0,512,96);
    x.arcTo(0,512,0,0,96); x.arcTo(0,0,512,0,96); x.closePath();
    x.clip();

    // Dark green background gradient
    var bg=x.createLinearGradient(0,0,512,512);
    bg.addColorStop(0,'#0d1f14'); bg.addColorStop(1,'#060d09');
    x.fillStyle=bg; x.fillRect(0,0,512,512);

    // Glow top-left
    var g1=x.createRadialGradient(110,120,0,110,120,240);
    g1.addColorStop(0,'rgba(29,185,84,0.5)'); g1.addColorStop(1,'transparent');
    x.fillStyle=g1; x.fillRect(0,0,512,512);

    // Glow bottom-right
    var g2=x.createRadialGradient(400,400,0,400,400,200);
    g2.addColorStop(0,'rgba(29,185,84,0.2)'); g2.addColorStop(1,'transparent');
    x.fillStyle=g2; x.fillRect(0,0,512,512);

    // Subtle grid
    x.strokeStyle='rgba(29,185,84,0.06)'; x.lineWidth=1;
    for(var i=0;i<512;i+=40){
      x.beginPath();x.moveTo(i,0);x.lineTo(i,512);x.stroke();
      x.beginPath();x.moveTo(0,i);x.lineTo(512,i);x.stroke();
    }

    // Equaliser bars
    var bars=[0.3,0.65,1.0,0.7,0.5,0.88,0.42,0.72,0.95,0.58,0.38,0.8];
    var bw=18,gap=10,total=bars.length*(bw+gap)-gap;
    var sx=(512-total)/2,cy=318;
    bars.forEach(function(h,i){
      var ht=h*130,bx=sx+i*(bw+gap),by=cy-ht/2;
      var grad=x.createLinearGradient(0,by,0,by+ht);
      grad.addColorStop(0,'rgba(29,185,84,0.95)');
      grad.addColorStop(1,'rgba(29,185,84,0.25)');
      x.fillStyle=grad;
      x.beginPath(); x.roundRect(bx,by,bw,ht,5); x.fill();
    });

    // White S with green glow
    x.shadowColor='rgba(29,185,84,0.7)'; x.shadowBlur=50;
    x.font='bold 200px Arial'; x.textAlign='center'; x.textBaseline='middle';
    x.fillStyle='#ffffff'; x.fillText('S',256,168);
    x.shadowBlur=0;

    // Subtle wordmark
    x.font='300 38px Arial'; x.fillStyle='rgba(255,255,255,0.3)';
    x.fillText('SORTIFY',256,445);

    var d=c.toDataURL('image/png');
    ['apple-touch-icon','icon'].forEach(function(r){
      var l=document.createElement('link'); l.rel=r; l.href=d; document.head.appendChild(l);
    });
  } catch(e) {}
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1DB954;
  --g10:rgba(29,185,84,0.10);
  --g25:rgba(29,185,84,0.25);
  --bg:#0d0d0d;
  --s1:#161616;
  --s2:#1e1e1e;
  --br:#2a2a2a;
  --tx:#ffffff;
  --m1:rgba(255,255,255,0.55);
  --m2:rgba(255,255,255,0.25);
  --safe-b:env(safe-area-inset-bottom,16px);
}
html,body{
  height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden;
}

/* ─── SCREENS ─── */
.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* ─── LANDING ─── */
#s-landing{
  align-items:center;justify-content:center;gap:0;
  background:radial-gradient(ellipse 80% 60% at 30% 40%, rgba(29,185,84,0.18) 0%, transparent 70%),
             radial-gradient(ellipse 60% 50% at 70% 70%, rgba(29,185,84,0.10) 0%, transparent 70%),
             var(--bg);
}
.land-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 32px;text-align:center}
.land-icon{font-size:64px;font-weight:700;color:var(--g);letter-spacing:-3px;line-height:1}
.land-title{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.land-sub{font-size:15px;color:var(--m1);line-height:1.5;max-width:280px}
.btn-spotify{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--g);color:#000;font-size:16px;font-weight:600;
  padding:16px 32px;border-radius:50px;border:none;cursor:pointer;
  width:100%;max-width:280px;margin-top:8px;
  -webkit-appearance:none;
}
.btn-spotify svg{width:22px;height:22px;flex-shrink:0}

/* ─── APP ─── */
#s-app{background:var(--bg)}

/* Top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));
  background:var(--s1);border-bottom:1px solid var(--br);
  flex-shrink:0;
}
.topbar-logo{font-size:19px;font-weight:700;color:var(--g);letter-spacing:-0.5px}
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-user img{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--s2)}
.topbar-user span{font-size:13px;color:var(--m1)}
.btn-out{background:none;border:1px solid var(--br);color:var(--m1);font-size:12px;padding:5px 11px;border-radius:6px;cursor:pointer}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--s1)}
.tab{
  flex:1;padding:12px 8px;font-size:13px;font-weight:500;
  color:var(--m1);text-align:center;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.2s;
}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* Tab panels */
.panels{flex:1;overflow:hidden;position:relative;min-height:0}
.panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.panel.on{display:flex}

/* Search bar */
.searchbar{padding:10px 12px;background:var(--s1);border-bottom:1px solid var(--br);flex-shrink:0;display:flex;gap:8px;align-items:center}
.search{
  flex:1;background:var(--s2);border:1px solid var(--br);border-radius:8px;
  padding:8px 12px;font-size:14px;color:var(--tx);
  -webkit-appearance:none;outline:none;
}
.search:focus{border-color:var(--g)}
.search::placeholder{color:var(--m2)}
.lnk{font-size:12px;color:var(--m1);background:none;border:none;padding:6px 4px;cursor:pointer;white-space:nowrap}

/* Lists */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* Song row */
.si{
  display:flex;align-items:center;gap:11px;
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background 0.12s;min-height:60px;
}
.si:active{background:var(--s2)}
.si.on{background:var(--g10)}
.chk{
  width:20px;height:20px;border-radius:5px;border:1.5px solid var(--br);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.si.on .chk{background:var(--g);border-color:var(--g)}
.sart{width:42px;height:42px;border-radius:6px;background:var(--s2);object-fit:cover;flex-shrink:0}
.stxt{flex:1;min-width:0}
.sname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sartist{font-size:12px;color:var(--m1);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si.on .sname{color:var(--g)}

/* Playlist row */
.pli{
  display:flex;align-items:center;gap:11px;
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background 0.12s;min-height:60px;position:relative;
}
.pli:active{background:var(--s2)}
.pli.on{background:var(--g10)}
.pli.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--g);border-radius:0 2px 2px 0}
.plart{width:42px;height:42px;border-radius:6px;object-fit:cover;background:var(--s2);flex-shrink:0}
.plico{width:42px;height:42px;border-radius:6px;background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--m2)}
.pltxt{flex:1;min-width:0}
.plname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pli.on .plname{color:var(--g)}
.plcount{font-size:12px;color:var(--m1);margin-top:2px}
.pli-check{font-size:18px;color:var(--g);flex-shrink:0;opacity:0}
.pli.on .pli-check{opacity:1}

/* Bottom action bar */
.action-bar{
  background:var(--s1);border-top:1px solid var(--br);
  padding:12px 16px;padding-bottom:max(12px,var(--safe-b));
  flex-shrink:0;display:flex;flex-direction:column;gap:10px;
}
.action-info{font-size:13px;color:var(--m1);text-align:center;min-height:18px}
.action-info strong{color:var(--tx)}
.action-info em{color:var(--g);font-style:normal}
.action-buttons{display:flex;gap:8px}
.btn-add{
  flex:1;padding:14px;border-radius:12px;border:none;cursor:pointer;
  background:var(--g);color:#000;font-size:15px;font-weight:600;
  transition:opacity 0.15s;-webkit-appearance:none;
}
.btn-add:disabled{opacity:0.3;cursor:not-allowed}
.btn-sort{
  padding:14px 18px;border-radius:12px;border:1px solid var(--g25);cursor:pointer;
  background:var(--g10);color:var(--g);font-size:14px;font-weight:500;
  white-space:nowrap;-webkit-appearance:none;
}

/* ─── MODAL ─── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--s1);border:1px solid var(--br);
  border-radius:20px 20px 0 0;padding:20px 16px;
  width:100%;max-width:500px;
  max-height:90vh;display:flex;flex-direction:column;gap:14px;
  padding-bottom:max(20px,var(--safe-b));
}
.modal-handle{width:36px;height:4px;background:var(--br);border-radius:2px;margin:0 auto -4px}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.modal-desc{font-size:13px;color:var(--m1);line-height:1.5}
.mstatus{
  display:none;align-items:center;gap:10px;
  background:var(--s2);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--m1);
}
.mstatus.on{display:flex}
.mspin{width:14px;height:14px;border-radius:50%;border:2px solid var(--br);border-top-color:var(--g);animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.mpills{display:flex;flex-wrap:wrap;gap:6px}
.mpill{padding:4px 10px;border-radius:100px;background:var(--s2);border:1px solid var(--br);font-size:12px;color:var(--m1)}
.mpill.g{border-color:var(--g25);color:var(--g)}
.mscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.mscroll::-webkit-scrollbar{display:none}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
.rrow:last-child{border:none}
.rsong{flex:1;min-width:0}
.rname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.rartist{font-size:11px;color:var(--m1);margin-top:2px}
.rscore{font-size:11px;color:var(--g);margin-top:1px}
.rarrow{color:var(--m2);flex-shrink:0}
.rpl{font-size:12px;color:var(--g);font-weight:500;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;text-align:right}
.mfoot{display:flex;gap:8px;flex-shrink:0}
.btn-mc{flex:1;padding:13px;border-radius:12px;border:1px solid var(--br);background:none;color:var(--m1);font-size:14px;cursor:pointer;-webkit-appearance:none}
.btn-mok{flex:2;padding:13px;border-radius:12px;border:none;background:var(--g);color:#000;font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.btn-mok:disabled{opacity:0.3;cursor:not-allowed}

/* ─── LOADER ─── */
#loader{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(13,13,13,0.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
#loader.on{display:flex}
.lspin{width:32px;height:32px;border-radius:50%;border:2px solid var(--br);border-top-color:var(--g);animation:spin 0.7s linear infinite}
.ltxt{font-size:13px;color:var(--m1);max-width:220px;text-align:center;line-height:1.5}
.lbar{width:140px;height:2px;background:var(--br);border-radius:1px;overflow:hidden}
.lfill{height:100%;background:var(--g);transition:width 0.35s;width:0}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:max(80px,calc(var(--safe-b) + 80px));left:50%;
  transform:translateX(-50%) translateY(40px);opacity:0;
  background:var(--s2);border:1px solid var(--br);border-radius:100px;
  padding:10px 18px;font-size:13px;z-index:300;white-space:nowrap;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.2s;
}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{border-color:var(--g25);color:var(--g)}
#toast.err{border-color:rgba(255,80,80,0.4);color:#ff6060}

.empty{display:flex;align-items:center;justify-content:center;padding:48px 24px;color:var(--m1);font-size:13px;text-align:center;line-height:1.7}
</style>
</head>
<body>

<!-- LANDING -->
<div class="screen active" id="s-landing">
  <div class="land-wrap">
    <div class="land-icon">S</div>
    <div class="land-title">Sortify</div>
    <div class="land-sub">Sort your liked songs into your Spotify playlists — automatically.</div>
    <button class="btn-spotify" onclick="startAuth()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Connect with Spotify
    </button>
  </div>
</div>

<!-- APP -->
<div class="screen" id="s-app">
  <div class="topbar">
    <div class="topbar-logo">Sortify</div>
    <div class="topbar-user">
      <img id="uav" src="" alt="" onerror="this.style.display='none'">
      <span id="uname"></span>
      <button class="btn-out" onclick="logout()">Out</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" id="tab-songs" onclick="switchTab('songs')">
      Liked Songs <span id="badge-songs" style="font-size:11px;color:var(--m2)"></span>
    </div>
    <div class="tab" id="tab-pls" onclick="switchTab('pls')">
      Playlists <span id="badge-pls" style="font-size:11px;color:var(--m2)"></span>
    </div>
  </div>

  <div class="panels">
    <!-- Songs panel -->
    <div class="panel on" id="panel-songs">
      <div class="searchbar">
        <input class="search" id="search" placeholder="Search…" oninput="filterSongs()">
        <button class="lnk" onclick="selAll()">All</button>
        <button class="lnk" onclick="clearSel()">Clear</button>
      </div>
      <div class="scroll" id="slist"></div>
    </div>

    <!-- Playlists panel -->
    <div class="panel" id="panel-pls">
      <div class="scroll" id="pllist"></div>
    </div>
  </div>

  <div class="action-bar">
    <div class="action-info" id="action-info">Pick songs, then choose a playlist</div>
    <div class="action-buttons">
      <button class="btn-add" id="btn-add" onclick="addToPl()" disabled>Add to Playlist</button>
      <button class="btn-sort" onclick="openSort()">✦ Sort All</button>
    </div>
  </div>
</div>

<!-- SORT MODAL -->
<div class="modal-overlay" id="sort-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div>
      <div class="modal-title">Smart Sort</div>
      <div class="modal-desc" id="m-desc">Reads your playlists' audio fingerprint and matches every liked song to where it sounds best.</div>
    </div>
    <div class="mstatus" id="mstatus"><div class="mspin"></div><span id="mstxt">Starting…</span></div>
    <div class="mpills" id="mpills"></div>
    <div class="mscroll" id="mresults"></div>
    <div class="mfoot" id="mfoot" style="display:none">
      <button class="btn-mc" onclick="closeSort()">Cancel</button>
      <button class="btn-mok" id="btn-apply" onclick="applySort()">Add to playlists →</button>
    </div>
  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="lspin"></div>
  <div class="ltxt" id="ltxt">Loading…</div>
  <div class="lbar"><div class="lfill" id="lfill"></div></div>
</div>

<div id="toast"></div>

<script>
const CLIENT_ID='fcce7972e4c14b569c80597bff984858';
const REDIR=location.href.split('?')[0].split('#')[0];
const SCOPES='user-library-read playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private';

let token=null,songs=[],filtered=[],playlists=[],sel=new Set(),activePl=null,sortPlan=[];

// PKCE
const rnd=n=>{const a=new Uint8Array(n);crypto.getRandomValues(a);return[...a].map(b=>b.toString(16).padStart(2,'0')).join('')};
const sha=async s=>crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');

async function startAuth(){
  const v=rnd(64);localStorage.setItem('v',v);
  const p=new URLSearchParams({response_type:'code',client_id:CLIENT_ID,scope:SCOPES,redirect_uri:REDIR,code_challenge_method:'S256',code_challenge:b64(await sha(v))});
  location.href='https://accounts.spotify.com/authorize?'+p;
}

async function handleCode(code){
  const v=localStorage.getItem('v');
  if(!v){toast('Auth lost','err');return}
  load('Connecting…',15);
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIR,client_id:CLIENT_ID,code_verifier:v})});
  const d=await r.json();
  if(d.error){hideLoad();toast(d.error_description||d.error,'err');return}
  token=d.access_token;localStorage.setItem('tok',token);localStorage.removeItem('v');
  history.replaceState({},'',location.pathname);
  await boot();
}

async function api(path){
  const url=path.startsWith('http')?path:'https://api.spotify.com/v1'+path;
  const r=await fetch(url,{headers:{Authorization:'Bearer '+token}});
  if(r.status===401){logout();throw new Error('Session expired')}
  if(r.status===403||r.status===404)return null;
  if(!r.ok)throw new Error('Spotify error '+r.status);
  try{return await r.json()}catch(e){return{}}
}

async function apiPost(path,body){
  const r=await fetch('https://api.spotify.com/v1'+path,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===401){logout();throw new Error('Session expired')}
  if(r.status===403)throw new Error("Can't edit this playlist");
  if(!r.ok)throw new Error('Spotify error '+r.status);
  try{return await r.json()}catch(e){return{}}
}

async function boot(){
  try{
    load('Getting your profile…',20);
    const me=await api('/me');
    if(!me)throw new Error('Could not load profile');
    document.getElementById('uname').textContent=me.display_name||me.id;
    const av=me.images?.[0]?.url;if(av)document.getElementById('uav').src=av;

    load('Loading playlists…',40);
    await loadPlaylists();

    load('Loading liked songs…',65);
    await loadLikedSongs();

    hideLoad();showApp();
  }catch(e){hideLoad();toast('Error: '+e.message,'err')}
}

async function loadPlaylists(){
  playlists=[];
  let url='/me/playlists?limit=50';
  while(url){
    const d=await api(url);if(!d)break;
    (d.items||[]).forEach(p=>{if(p&&p.id&&p.name)playlists.push(p)});
    url=d.next||null;
  }
  document.getElementById('badge-pls').textContent=playlists.length||'';
  renderPlaylists();
}

async function loadLikedSongs(){
  songs=[];
  let url='/me/tracks?limit=50',total=null;
  while(url){
    const d=await api(url);if(!d)break;
    if(total===null)total=d.total;
    (d.items||[]).forEach(i=>{if(i?.track?.id)songs.push(i)});
    load('Loading songs… '+songs.length+'/'+(total||'?'),65+Math.round((songs.length/(total||1))*30));
    url=d.next||null;
  }
  filtered=[...songs];
  document.getElementById('badge-songs').textContent=songs.length||'';
  renderSongs();
}

const CHK='<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3 6-7" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function renderSongs(){
  const el=document.getElementById('slist');
  if(!filtered.length){el.innerHTML='<div class="empty">No songs found</div>';return}
  el.innerHTML=filtered.map(item=>{
    const t=item.track,uri=t.uri,on=sel.has(uri);
    const art=t.album?.images?.[2]?.url||t.album?.images?.[0]?.url||'';
    return`<div class="si${on?' on':''}" onclick="togSong(event,'${uri.replace(/'/g,"\'")}',this)">
      <div class="chk">${on?CHK:''}</div>
      ${art?`<img class="sart" src="${art}" loading="lazy" alt="">`:'<div class="sart"></div>'}
      <div class="stxt">
        <div class="sname">${esc(t.name)}</div>
        <div class="sartist">${esc(t.artists?.map(a=>a.name).join(', ')||'')}</div>
      </div>
    </div>`;
  }).join('');
}

function renderPlaylists(){
  const el=document.getElementById('pllist');
  if(!playlists.length){el.innerHTML='<div class="empty">No playlists found. Create one in the Spotify app first.</div>';return}
  el.innerHTML=playlists.map(p=>{
    const art=p.images?.[0]?.url,on=p.id===activePl,ct=p.tracks?.total??'?';
    return`<div class="pli${on?' on':''}" onclick="selPl('${p.id}',this)">
      ${art?`<img class="plart" src="${art}" alt="">`:'<div class="plico">♪</div>'}
      <div class="pltxt"><div class="plname">${esc(p.name)}</div><div class="plcount">${ct} songs</div></div>
      <div class="pli-check">✓</div>
    </div>`;
  }).join('');
}

function togSong(e,uri,el){
  e.preventDefault();
  if(sel.has(uri)){sel.delete(uri);el.classList.remove('on');el.querySelector('.chk').innerHTML=''}
  else{sel.add(uri);el.classList.add('on');el.querySelector('.chk').innerHTML=CHK}
  updInfo();
}
function selAll(){filtered.forEach(i=>sel.add(i.track.uri));renderSongs();updInfo()}
function clearSel(){sel.clear();renderSongs();updInfo()}
function selPl(id,el){
  activePl=id;
  document.querySelectorAll('.pli').forEach(r=>r.classList.remove('on'));
  el.classList.add('on');
  updInfo();
  // Switch back to songs tab so user can select songs
  if(sel.size===0)switchTab('songs');
}
function filterSongs(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  filtered=q?songs.filter(i=>i.track.name.toLowerCase().includes(q)||i.track.artists?.some(a=>a.name.toLowerCase().includes(q))):[...songs];
  renderSongs();
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(e=>e.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('panel-'+t).classList.add('on');
}

function updInfo(){
  const n=sel.size,pl=playlists.find(p=>p.id===activePl);
  const info=document.getElementById('action-info');
  if(!n&&!activePl)info.textContent='Pick songs, then choose a playlist';
  else if(!n)info.innerHTML=`Playlist: <em>${esc(pl.name)}</em> — now pick songs`;
  else if(!activePl)info.innerHTML=`<strong>${n}</strong> song${n>1?'s':''} — pick a playlist`;
  else info.innerHTML=`<strong>${n}</strong> song${n>1?'s':''} → <em>${esc(pl.name)}</em>`;
  document.getElementById('btn-add').disabled=!(n>0&&activePl);
}

async function addToPl(){
  if(!sel.size||!activePl)return;
  const uris=[...sel],pl=playlists.find(p=>p.id===activePl);
  load(`Adding ${uris.length} songs…`,50);
  try{
    for(let i=0;i<uris.length;i+=100)await apiPost(`/playlists/${activePl}/tracks`,{uris:uris.slice(i,i+100)});
    hideLoad();toast(`✓ Added ${uris.length} songs to "${pl?.name}"`, 'ok');
    clearSel();
    const upd=await api(`/playlists/${activePl}`);
    if(upd){const i=playlists.findIndex(p=>p.id===activePl);if(i>-1){playlists[i].tracks=upd.tracks;renderPlaylists()}}
  }catch(e){hideLoad();toast(e.message,'err')}
}

// SMART SORT
async function getAF(ids){
  const map={},u=[...new Set(ids)].filter(Boolean);
  for(let i=0;i<u.length;i+=100){
    const d=await api(`/audio-features?ids=${u.slice(i,i+100).join(',')}`);
    d?.audio_features?.forEach(f=>{if(f)map[f.id]=f});
  }
  return map;
}
async function getAG(ids){
  const map={},u=[...new Set(ids)].filter(Boolean);
  for(let i=0;i<u.length;i+=50){
    const d=await api(`/artists?ids=${u.slice(i,i+50).join(',')}`);
    d?.artists?.forEach(a=>{if(a)map[a.id]=a.genres||[]});
  }
  return map;
}
function cen(feats){
  const K=['danceability','energy','valence','acousticness','instrumentalness','speechiness'];
  const v=feats.filter(Boolean);if(!v.length)return null;
  const c={};K.forEach(k=>c[k]=v.reduce((s,f)=>s+(f[k]||0),0)/v.length);
  c.tn=v.reduce((s,f)=>s+Math.min((f.tempo||120)/200,1),0)/v.length;
  return c;
}
function sim(feat,c){
  if(!feat||!c)return 0;
  const W={danceability:1.5,energy:1.5,valence:1.3,acousticness:1.1,instrumentalness:0.8,speechiness:0.5,tn:0.8};
  const f={...feat,tn:Math.min((feat.tempo||120)/200,1)};
  let n=0,d=0;Object.entries(W).forEach(([k,w])=>{n+=w*(f[k]||0)*(c[k]||0);d+=w});
  return d?n/d:0;
}

function openSort(){
  sortPlan=[];
  document.getElementById('sort-modal').classList.add('open');
  document.getElementById('mresults').innerHTML='';
  document.getElementById('mpills').innerHTML='';
  document.getElementById('mfoot').style.display='none';
  document.getElementById('m-desc').textContent="Reads your playlists' audio fingerprint and matches every liked song to where it sounds best.";
  setMS('Starting…',true);
  runSort();
}
function closeSort(){document.getElementById('sort-modal').classList.remove('open')}
function setMS(m,show){document.getElementById('mstatus').className='mstatus'+(show?' on':'');document.getElementById('mstxt').textContent=m}
function setMP(matched,skipped){document.getElementById('mpills').innerHTML=`<span class="mpill g">✓ ${matched} matched</span><span class="mpill">${skipped} skipped</span>`}

async function runSort(){
  document.getElementById('m-desc').textContent='';
  try{
    const elPls=playlists.filter(p=>(p.tracks?.total||0)>0);
    if(!elPls.length){setMS('Your playlists need songs first. Add tracks to a playlist in Spotify, then try again.');return}

    const profiles=[];
    for(let i=0;i<elPls.length;i++){
      const p=elPls[i];setMS(`Profiling "${p.name}"… ${i+1}/${elPls.length}`);
      const d=await api(`/playlists/${p.id}/tracks?limit=100`);if(!d)continue;
      const tids=(d.items||[]).map(x=>x?.track?.id).filter(Boolean);
      const aids=(d.items||[]).flatMap(x=>x?.track?.artists?.map(a=>a.id)||[]).filter(Boolean);
      if(!tids.length)continue;
      const[fm,gm]=await Promise.all([getAF(tids),getAG(aids)]);
      const cn=cen(tids.map(id=>fm[id]));
      const genres=new Set(Object.values(gm).flat());
      if(cn)profiles.push({id:p.id,name:p.name,cn,genres});
    }
    if(!profiles.length){setMS('Could not read audio data. Make sure your playlists have songs.');return}

    setMS(`Analysing ${songs.length} songs…`);
    const sids=songs.map(i=>i.track.id);
    const saids=songs.flatMap(i=>i.track.artists.map(a=>a.id));
    const[sfm,sgm]=await Promise.all([getAF(sids),getAG(saids)]);

    setMS('Matching…');
    let matched=0,skipped=0;sortPlan=[];
    songs.forEach(item=>{
      const t=item.track,feat=sfm[t.id]||null;
      const sg=t.artists.flatMap(a=>sgm[a.id]||[]);
      let best=null,bs=-Infinity;
      profiles.forEach(pr=>{
        let s=sim(feat,pr.cn);
        sg.forEach(g=>{if(pr.genres.has(g))s+=0.06});
        if(s>bs){bs=s;best=pr}
      });
      if(best&&(feat?bs>0.3:sg.some(g=>best.genres.has(g)))){
        sortPlan.push({uri:t.uri,plId:best.id,plName:best.name,song:t.name,artist:t.artists[0]?.name,score:Math.max(0,Math.round(bs*100))});
        matched++;
      }else skipped++;
    });

    setMS('',false);setMP(matched,skipped);
    if(!sortPlan.length){document.getElementById('mresults').innerHTML='<div class="empty">No matches. Playlists need more songs so Smart Sort can learn their sound.</div>';return}
    sortPlan.sort((a,b)=>b.score-a.score);
    document.getElementById('mresults').innerHTML=sortPlan.map(m=>`
      <div class="rrow">
        <div class="rsong">
          <div class="rname">${esc(m.song)}</div>
          <div class="rartist">${esc(m.artist||'')}</div>
          <div class="rscore">${m.score}% match</div>
        </div>
        <div class="rarrow">→</div>
        <div class="rpl">${esc(m.plName)}</div>
      </div>`).join('');
    document.getElementById('mfoot').style.display='flex';
  }catch(e){setMS('Error: '+e.message,true)}
}

async function applySort(){
  if(!sortPlan.length)return;
  closeSort();
  const groups={};
  sortPlan.forEach(m=>{if(!groups[m.plId])groups[m.plId]=[];groups[m.plId].push(m.uri)});
  const entries=Object.entries(groups);let added=0;
  for(let i=0;i<entries.length;i++){
    const[plId,uris]=entries[i],pl=playlists.find(p=>p.id===plId);
    load(`Adding to "${pl?.name}"…`,10+Math.round((i/entries.length)*85));
    for(let j=0;j<uris.length;j+=100)try{await apiPost(`/playlists/${plId}/tracks`,{uris:uris.slice(j,j+100)})}catch(e){console.warn(e.message)}
    added+=uris.length;
  }
  hideLoad();toast(`✓ Sorted ${added} songs into ${entries.length} playlists`,'ok');
  for(const[plId]of entries){const u=await api(`/playlists/${plId}`);if(u){const i=playlists.findIndex(p=>p.id===plId);if(i>-1)playlists[i].tracks=u.tracks}}
  renderPlaylists();
}

function showApp(){document.getElementById('s-landing').classList.remove('active');document.getElementById('s-app').classList.add('active')}
function load(m,p){document.getElementById('loader').classList.add('on');document.getElementById('ltxt').textContent=m;document.getElementById('lfill').style.width=(p||0)+'%'}
function hideLoad(){document.getElementById('lfill').style.width='100%';setTimeout(()=>document.getElementById('loader').classList.remove('on'),250)}
let _t;function toast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='on '+t;clearTimeout(_t);_t=setTimeout(()=>e.className='',3500)}
function logout(){localStorage.removeItem('tok');location.reload()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

(async()=>{
  const p=new URLSearchParams(location.search);
  if(p.get('error')){toast('Spotify auth cancelled','err');return}
  if(p.get('code')){await handleCode(p.get('code'));return}
  const t=localStorage.getItem('tok');
  if(t){token=t;load('Loading…',5);try{await boot()}catch(e){hideLoad();localStorage.removeItem('tok')}}
})();
