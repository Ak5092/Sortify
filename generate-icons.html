<!DOCTYPE html>
<html>
<head>
  <title>Sortify Icon Generator</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 30px; }
    canvas { border-radius: 22%; display: block; margin: 10px 0; }
    button { margin: 5px; padding: 10px 20px; background: #1DB954; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .sizes { display: flex; gap: 20px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h2>Sortify Icon Generator</h2>
  <p>Click each button to download the icon at that size.</p>
  <div class="sizes" id="canvases"></div>
  <script>
    const sizes = [180, 192, 512];
    const container = document.getElementById('canvases');

    sizes.forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Background
      const bg = ctx.createLinearGradient(0, 0, size, size);
      bg.addColorStop(0, '#0d1a12');
      bg.addColorStop(1, '#080810');
      ctx.fillStyle = bg;
      ctx.roundRect(0, 0, size, size, size * 0.22);
      ctx.fill();

      // Green glow
      const glow = ctx.createRadialGradient(size/2, size*0.4, 0, size/2, size*0.4, size*0.5);
      glow.addColorStop(0, 'rgba(29,185,84,0.25)');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, size, size);

      // Spotify-style concentric arcs (the "S" signal)
      const cx = size / 2;
      const cy = size / 2;
      const r  = size * 0.28;

      const arcs = [
        { r: r,       w: size*0.05, y: -0.15 },
        { r: r*0.7,   w: size*0.05, y: 0 },
      ];

      arcs.forEach(({ r: radius, w, y }) => {
        ctx.beginPath();
        ctx.arc(cx, cy + cy * y * 0.1, radius, Math.PI * 1.15, Math.PI * 1.85);
        ctx.strokeStyle = '#1DB954';
        ctx.lineWidth = w;
        ctx.lineCap = 'round';
        ctx.stroke();
      });

      // Center dot
      ctx.beginPath();
      ctx.arc(cx, cy + size * 0.06, size * 0.055, 0, Math.PI * 2);
      ctx.fillStyle = '#1DB954';
      ctx.fill();

      container.appendChild(canvas);

      const btn = document.createElement('button');
      btn.textContent = `Download ${size}×${size}`;
      btn.onclick = () => {
        const a = document.createElement('a');
        a.download = `icon-${size}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      };
      container.appendChild(btn);
    });
  </script>
</body>
</html>
